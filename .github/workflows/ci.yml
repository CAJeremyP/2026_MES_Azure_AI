name: Lint & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 pyflakes

      - name: Lint app/ directory
        run: |
          flake8 app/ scripts/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exclude=app/output/

      - name: Check for accidentally staged .env files
        run: |
          if git ls-files | grep -q '\.env$'; then
            echo "ERROR: .env file is tracked by Git — remove it immediately!"
            exit 1
          fi
          echo "✅ No .env files tracked."

  bicep-validate:
    name: Bicep Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Install Bicep
        run: az bicep install

      - name: Validate Bicep syntax
        run: |
          az bicep build --file infra/main.bicep --stdout > /dev/null
          echo "✅ Bicep syntax valid."

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with truffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified
